services:
 # app:
   # build: .
    #container_name: bank_app
   # ports:
    #  - "8080:8080"
    #depends_on:
     # - postgres
    #env_file:
     # - .env
  postgres:
    env_file:
      - .env

    image: postgres:16
    container_name: postgres_db_bankApp
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${SPRING_DATABASE_USERNAME}
      POSTGRES_USER: ${SPRING_DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${SPRING_DATABASE_PASSWORD}
    ports:
      - "${SPRING_DATABASE_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data: